# XcodeGen project.yml
# https://github.com/yonaskolb/XcodeGen
#
# To generate the Xcode project:
#   1. Install XcodeGen: `brew install xcodegen`
#   2. Run: `xcodegen generate`
#   3. Open VoiceFlow.xcodeproj
#
# This makes the project structure 100% reproducible and code-reviewable.

name: VoiceFlow
options:
  bundleIdPrefix: de.marvinschwab
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    # Enable strict concurrency for Swift 6 readiness
    SWIFT_UPCOMING_FEATURE_REGION_BASED_ISOLATION: YES

# Package dependencies (SPM)
packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.7.0"
  # FluidAudio:
  #   url: https://github.com/FluidInference/FluidAudio
  #   from: "0.1.0"

# ============================================================================
# Targets
# ============================================================================

targets:

  # ==========================================================================
  # Main App Target
  # ==========================================================================
  VoiceFlow:
    type: application
    platform: iOS
    sources:
      - path: Sources/VoiceFlow
      - path: Sources/VoiceFlowShared
    resources:
      - path: Resources
        optional: true
    dependencies:
      - target: VoiceFlowShared
        embed: true
      - package: WhisperKit
    info:
      path: Sources/VoiceFlow/Info.plist
      properties:
        CFBundleDisplayName: VoiceFlow
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - audio
        NSMicrophoneUsageDescription: "VoiceFlow needs microphone access to transcribe your speech locally on your device. Audio never leaves your phone."
        NSSpeechRecognitionUsageDescription: "VoiceFlow uses speech recognition to transcribe your voice."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.marvinschwab.voiceflow
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  # ==========================================================================
  # Keyboard Extension Target
  # ==========================================================================
  VoiceFlowKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/VoiceFlowKeyboard
      - path: Sources/VoiceFlowShared
    dependencies:
      - target: VoiceFlowShared
        embed: false
      - sdk: UIKit.framework
    info:
      path: Sources/VoiceFlowKeyboard/Info.plist
      properties:
        CFBundleDisplayName: VoiceFlow Keyboard
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.marvinschwab.voiceflow.keyboard
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: YES

  # ==========================================================================
  # Shared Framework
  # ==========================================================================
  VoiceFlowShared:
    type: framework
    platform: iOS
    sources:
      - path: Sources/VoiceFlowShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.marvinschwab.voiceflow.shared
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES

  # ==========================================================================
  # Unit Tests Target
  # ==========================================================================
  VoiceFlowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/VoiceFlowTests
    dependencies:
      - target: VoiceFlow
      - target: VoiceFlowShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.marvinschwab.voiceflow.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/VoiceFlow.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/VoiceFlow
        BUNDLE_LOADER: $(TEST_HOST)

  # ==========================================================================
  # UI Tests Target
  # ==========================================================================
  VoiceFlowUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/VoiceFlowUITests
    dependencies:
      - target: VoiceFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.marvinschwab.voiceflow.uitests
        TEST_TARGET_NAME: VoiceFlow

# ============================================================================
# Schemes
# ============================================================================

schemes:

  VoiceFlow:
    build:
      targets:
        VoiceFlow: all
        VoiceFlowTests: [test]
        VoiceFlowUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VoiceFlowTests
        - VoiceFlowUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  VoiceFlowKeyboard:
    build:
      targets:
        VoiceFlowKeyboard: all
